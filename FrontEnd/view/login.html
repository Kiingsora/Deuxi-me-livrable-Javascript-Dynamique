<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sophie Bluel - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles/login.css">
</head>
<body>
  <div class="page">
    <header>
      <h1>Sophie Bluel <span>Architecte d'intérieur</span></h1>
      <nav>
        <ul>
          <li>projets</li>
          <li>contact</li>
          <li><a href="./login.html">login</a></li>
          <li><img src="../assets/icons/instagram.png" alt="Instagram"></li>
        </ul>
      </nav>
    </header>

    <main class="login-main">
      <section class="login-section" aria-labelledby="login-title">
        <h2 id="login-title">Log In</h2>

        <form class="login-form" action="#" method="post">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" autocomplete="email" required>

          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>

          <button type="submit">Se connecter</button>
        </form>

        <a class="forgot-password" href="#">Mot de passe oublié</a>
      </section>
    </main>

    <footer class="site-footer">
      <a href="#">Mentions légales</a>
    </footer>
  </div>
</body>
</html>
